<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SkalekPi</title>
    <link rel="icon" type="image/png" href="logo.png">
    
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #1a1a1a;
            color: #D4FF1A;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 11px;
            line-height: 1.3;
            /* Ensure scrolling is allowed */
            overflow-y: scroll; 
            transition: background-color 0.2s, color 0.2s;
        }

        /* This is the key to fixing the lag: 
           We let the browser handle the wrapping natively 
           without extra HTML elements. */
        #pi-content {
            white-space: pre-wrap; 
            word-break: break-all;
            margin: 0;
        }

        body.inverted {
            background-color: white;
            color: black;
        }
    </style>
</head>
<body>

    <pre id="pi-content">Loading...</pre>

    <script>
        document.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 't') document.body.classList.toggle('inverted');
        });

        // The fetch already preloads the file into memory.
        fetch('pi-million.txt')
            .then(res => res.text())
            .then(text => {
                // Using textContent is vastly faster than innerHTML.
                // It does not create extra tags, so no lag.
                document.getElementById('pi-content').textContent = text;
            })
            .catch(err => {
                document.getElementById('pi-content').textContent = 'Error loading file.';
            });
    </script>
</body>
</html>
